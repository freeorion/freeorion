name: GDScript 4 linters and formatting

on:
  push:
    branches: [ 'master' ]
    paths:
      - 'godot4/**.gd'
  pull_request:
    branches: [ 'master' ]
    types: ['opened', 'reopened', 'synchronize']
    paths:
      - 'godot4/**.gd'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']
    steps:
      - uses: actions/checkout@v7
        with:
          sparse-checkout: godot4/
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install development dependencies
        run: |
          pip install "gdtoolkit==4.*"
      - name: Check format
        run: |
          find godot4/ -iname "*.gd" -not -path "godot4/addons/*" | xargs gdformat -c
      - name: Check lints
        run: |
          find godot4/ -iname "*.gd" -not -path "godot4/addons/*" | xargs gdlint
